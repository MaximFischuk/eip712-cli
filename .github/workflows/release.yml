name: Release

on:
    push:
        tags:
            - "v*"

permissions:
    contents: write

env:
    BINARY_NAME: eip712
    CARGO_TERM_COLOR: always

jobs:
    build:
        name: Build - ${{ matrix.target }}
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - target: aarch64-apple-darwin
                      os: macos-latest
                    - target: x86_64-apple-darwin
                      os: macos-latest
                    - target: x86_64-unknown-linux-gnu
                      os: ubuntu-latest
                    - target: aarch64-unknown-linux-gnu
                      os: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}

            - name: Install cross-compilation tools
              if: matrix.target == 'aarch64-unknown-linux-gnu'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
                  echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
                  echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
                  echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++" >> $GITHUB_ENV

            - name: Build
              run: cargo build --release --target ${{ matrix.target }}

            - name: Package
              shell: bash
              run: |
                  VERSION="${GITHUB_REF_NAME#v}"
                  ARCHIVE="eip712-cli-${VERSION}-${{ matrix.target }}.tar.gz"

                  cd target/${{ matrix.target }}/release
                  tar czf "../../../${ARCHIVE}" "${BINARY_NAME}"
                  cd ../../..

                  echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV
                  echo "VERSION=${VERSION}" >> $GITHUB_ENV

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: eip712-cli-${{ matrix.target }}
                  path: ${{ env.ARCHIVE }}

    release:
        name: Create Release
        needs: build
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Download artifacts
              uses: actions/download-artifact@v4
              with:
                  path: artifacts
                  merge-multiple: true

            - name: Generate checksums
              run: |
                  cd artifacts
                  sha256sum *.tar.gz > sha256sums.txt
                  cat sha256sums.txt

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  generate_release_notes: true
                  files: |
                      artifacts/*.tar.gz
                      artifacts/sha256sums.txt

    update-formula:
        name: Update Homebrew Formula
        needs: release
        runs-on: ubuntu-latest
        steps:
            - name: Checkout tap repository
              uses: actions/checkout@v4
              with:
                  repository: MaximFischuk/homebrew-eip712-cli
                  token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

            - name: Download checksums from release
              run: |
                  VERSION="${GITHUB_REF_NAME#v}"
                  curl -fsSL -o sha256sums.txt \
                    "https://github.com/MaximFischuk/eip712-cli/releases/download/${GITHUB_REF_NAME}/sha256sums.txt"
                  echo "VERSION=${VERSION}" >> $GITHUB_ENV

            - name: Update formula
              run: |
                  SHA_DARWIN_ARM64=$(grep "aarch64-apple-darwin" sha256sums.txt | awk '{print $1}')
                  SHA_DARWIN_X86=$(grep "x86_64-apple-darwin" sha256sums.txt | awk '{print $1}')
                  SHA_LINUX_X86=$(grep "x86_64-unknown-linux-gnu" sha256sums.txt | awk '{print $1}')
                  SHA_LINUX_ARM64=$(grep "aarch64-unknown-linux-gnu" sha256sums.txt | awk '{print $1}')

                  sed -i "s|version \".*\"|version \"${VERSION}\"|" Formula/eip712-cli.rb
                  sed -i "s|sha256 \"[a-f0-9]*\" # aarch64-apple-darwin|sha256 \"${SHA_DARWIN_ARM64}\" # aarch64-apple-darwin|" Formula/eip712-cli.rb
                  sed -i "s|sha256 \"[a-f0-9]*\" # x86_64-apple-darwin|sha256 \"${SHA_DARWIN_X86}\" # x86_64-apple-darwin|" Formula/eip712-cli.rb
                  sed -i "s|sha256 \"[a-f0-9]*\" # x86_64-unknown-linux-gnu|sha256 \"${SHA_LINUX_X86}\" # x86_64-unknown-linux-gnu|" Formula/eip712-cli.rb
                  sed -i "s|sha256 \"[a-f0-9]*\" # aarch64-unknown-linux-gnu|sha256 \"${SHA_LINUX_ARM64}\" # aarch64-unknown-linux-gnu|" Formula/eip712-cli.rb

            - name: Commit updated formula
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add Formula/eip712-cli.rb
                  git diff --cached --quiet || git commit -m "chore: update formula for v${VERSION}"
                  git push
